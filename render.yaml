services:
  - type: web
    name: hucap-backend
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: HUCAP_MODEL_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
